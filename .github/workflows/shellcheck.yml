name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/*.sh'
  pull_request:
    paths:
      - '.devcontainer/*.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck .devcontainer/*.sh
